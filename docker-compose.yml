services:
  web:
    build:
      context: .
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VISUAL_VISUAL_HTTPS_KEY: "${VISUAL_VISUAL_HTTPS_KEY:-}"
      VISUAL_VISUAL_HTTPS_CERT: "${VISUAL_VISUAL_HTTPS_CERT:-}"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm run dev

volumes:
  node_modules:
